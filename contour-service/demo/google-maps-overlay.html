<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Contour Overlay Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      html, body, #map { height: 100%; margin: 0; }
      .panel {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 5;
        background: #fff;
        border: 1px solid #ddd;
        padding: 8px;
        font-family: sans-serif;
        width: 340px;
      }
      input { width: 100%; margin: 4px 0; }
    </style>
  </head>
  <body>
    <div class="panel">
      <div><strong>Contour Tile Overlay</strong></div>
      <label>jobId</label>
      <input id="jobId" placeholder="paste jobId" />
      <button id="apply">Apply Overlay</button>
    </div>
    <div id="map"></div>

    <script>
      let map;
      let overlay;

      function initMap() {
        map = new google.maps.Map(document.getElementById('map'), {
          center: { lat: 37.7705, lng: -122.4390 },
          zoom: 14,
          mapTypeId: 'satellite'
        });

        document.getElementById('apply').addEventListener('click', () => {
          const jobId = document.getElementById('jobId').value.trim();
          if (!jobId) return;

          if (overlay) {
            const idx = map.overlayMapTypes.getArray().indexOf(overlay);
            if (idx >= 0) map.overlayMapTypes.removeAt(idx);
          }

          overlay = new google.maps.ImageMapType({
            tileSize: new google.maps.Size(256, 256),
            opacity: 1,
            getTileUrl: (coord, zoom) => {
              return `http://localhost:8080/v1/contours/tiles/${jobId}/${zoom}/${coord.x}/${coord.y}.png`;
            }
          });

          map.overlayMapTypes.push(overlay);
        });
      }
      window.initMap = initMap;
    </script>
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&callback=initMap"></script>
  </body>
</html>
